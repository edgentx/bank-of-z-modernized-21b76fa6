# S-40: container image build pipeline.
#
# Builds the backend (Spring Boot) and frontend (Next.js + nginx) images in
# parallel, tags each with the git SHA and a semantic version, scans for
# critical CVEs with Trivy, and (on main only) pushes to GHCR.
#
# PR builds run locally and run security scans without push, so reviewers
# can see whether the change introduces new criticals before anything lands
# in the registry.
#
# Security note: this workflow uses only built-in trusted inputs
# (github.repository_owner, github.actor, GITHUB_SHA, GITHUB_REF_*). It
# does NOT interpolate untrusted strings (issue/PR titles, commit messages,
# branch names) inside `run:` blocks, avoiding workflow-injection risks.

name: build-images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Compute shared image tags once so both image jobs use the same values.
  meta:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.tags.outputs.sha }}
      version: ${{ steps.tags.outputs.version }}
      build_date: ${{ steps.tags.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: tags
        name: Compute image tags
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-${SHA}")"
            VERSION="${VERSION#v}"
          fi
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "sha=${SHA}"
            echo "version=${VERSION}"
            echo "build_date=${BUILD_DATE}"
          } >> "$GITHUB_OUTPUT"

  # Backend + frontend images build in parallel via the matrix strategy.
  image:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: teller-core
            context: .
            dockerfile: Dockerfile
          - name: teller-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push only on main pushes and tagged releases — PRs build for scan only.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image ref
        id: ref
        env:
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          REF="${REGISTRY}/${IMAGE_OWNER}/${MATRIX_NAME}"
          echo "image=${REF,,}" >> "$GITHUB_OUTPUT"

      - name: Build (and push on main/tag)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: |
            ${{ steps.ref.outputs.image }}:sha-${{ needs.meta.outputs.sha }}
            ${{ steps.ref.outputs.image }}:v${{ needs.meta.outputs.version }}
            ${{ steps.ref.outputs.image }}:latest
          build-args: |
            VCS_REF=${{ needs.meta.outputs.sha }}
            VERSION=${{ needs.meta.outputs.version }}
            BUILD_DATE=${{ needs.meta.outputs.build_date }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      # Trivy enforces the "no critical vulnerabilities" acceptance criterion.
      - name: Trivy scan (fail on CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}:sha-${{ needs.meta.outputs.sha }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}
