{{- if .Values.backend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "teller.fullname" . }}-{{ .Values.backend.name }}
  labels:
    {{- include "teller.labels" (dict "ctx" . "component" .Values.backend.name) | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    {{- if .Values.envoy.enabled }}
    # Public port hits the Envoy sidecar first; it then forwards to the app.
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.envoy.listenPort }}
      protocol: TCP
    {{- else }}
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
    {{- end }}
  selector:
    {{- include "teller.selectorLabels" (dict "ctx" . "component" .Values.backend.name) | nindent 4 }}
{{- end }}
