{{- if and .Values.certManager.enabled .Values.certManager.clusterIssuer.create -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer.name }}
  labels:
    {{- include "teller.labels" (dict "ctx" . "component" "cert-manager") | nindent 4 }}
spec:
  acme:
    email: {{ .Values.certManager.clusterIssuer.email | quote }}
    server: {{ .Values.certManager.clusterIssuer.server | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-acme-key" .Values.certManager.clusterIssuer.name }}
    solvers:
      {{- if eq .Values.certManager.clusterIssuer.solver "http01" }}
      - http01:
          ingress:
            ingressClassName: {{ .Values.certManager.clusterIssuer.http01IngressClass }}
      {{- else if eq .Values.certManager.clusterIssuer.solver "dns01" }}
      - dns01:
          {{- if eq .Values.certManager.clusterIssuer.dns01.provider "route53" }}
          route53:
            region: {{ .Values.certManager.clusterIssuer.dns01.region }}
            {{- with .Values.certManager.clusterIssuer.dns01.hostedZoneID }}
            hostedZoneID: {{ . | quote }}
            {{- end }}
          {{- end }}
      {{- end }}
{{- end }}
