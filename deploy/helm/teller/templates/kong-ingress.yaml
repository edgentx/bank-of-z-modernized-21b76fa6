{{- if and .Values.backend.enabled .Values.kong.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "teller.fullname" . }}-api
  labels:
    {{- include "teller.labels" (dict "ctx" . "component" .Values.backend.name) | nindent 4 }}
  annotations:
    {{- with .Values.kong.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.certManager.enabled (not .Values.certManager.certificates.create) }}
    cert-manager.io/cluster-issuer: {{ .Values.certManager.clusterIssuer.name | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.kong.ingressClassName }}
  tls:
    - hosts:
        - {{ .Values.kong.host | quote }}
      secretName: {{ .Values.kong.tlsSecretName }}
  rules:
    - host: {{ .Values.kong.host | quote }}
      http:
        paths:
          {{- range .Values.kong.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "teller.fullname" $ }}-{{ $.Values.backend.name }}
                port:
                  number: {{ $.Values.backend.service.port }}
          {{- end }}
{{- end }}
