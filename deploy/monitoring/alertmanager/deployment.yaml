# S-43: Alertmanager Deployment + Service.
#
# Routes Prometheus alerts to Slack + PagerDuty via the configuration
# rendered from deploy/monitoring/alertmanager/alertmanager.yaml.
#
# Secrets (slack-platform-webhook, slack-teller-webhook, pagerduty-routing-key)
# are expected in the `alertmanager-secrets` Secret in the bank-observability
# namespace. The Deployment will start without the secret present
# (optional: true) — alerts simply won't route until it's populated.
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: bank-observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: observability
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9093"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9093
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: alertmanager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: bank-observability
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/alertmanager/alertmanager.yaml
            - --storage.path=/alertmanager
            - --cluster.listen-address=
          ports:
            - name: http
              containerPort: 9093
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: secrets
          secret:
            secretName: alertmanager-secrets
            optional: true
        - name: storage
          emptyDir:
            sizeLimit: 1Gi
