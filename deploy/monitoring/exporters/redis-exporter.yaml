# S-43: oliver006/redis_exporter for the Redis cache adapter (S-32).
#
# The exporter is a small sidecar-style Deployment in the same namespace
# as the application. It dials the Redis service that teller-core uses
# (CACHE_REDIS_HOST=redis, port 6379) and exposes /metrics on 9121, which
# Prometheus picks up via the redis-exporter scrape job.
#
# Auth: REDIS_PASSWORD comes from the same Secret the backend reads
# (teller-backend-secret rendered by the Helm chart) so we don't fan out
# the credential to a second source of truth.
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: bank-observability
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/component: exporter
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9121"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: redis-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: bank-observability
  labels:
    app.kubernetes.io/name: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 59000
        runAsGroup: 59000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.62.0-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_ADDR
              value: "redis://redis.bank.svc.cluster.local:6379"
            - name: REDIS_EXPORTER_LOG_FORMAT
              value: json
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-exporter-secret
                  key: REDIS_PASSWORD
                  optional: true
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
