# nginx in front of Next.js (standalone server) inside the same container.
# Static assets (_next/static, /public/*) are served directly by nginx for
# cache-headers + zero-roundtrip; everything else is reverse-proxied to the
# Node process listening on 127.0.0.1:3000.

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;

  # Non-root nginx can't write to /var/cache/nginx. Redirect the temp dirs to
  # /tmp which is world-writable in distroless-style runtimes too.
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 16;
  }

  server {
    listen 8080 default_server;
    server_name _;

    # Hardening: clickjacking, content-type sniffing, referrer.
    add_header X-Frame-Options          "DENY"        always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header Referrer-Policy          "no-referrer" always;

    # Liveness probe served by nginx directly so it succeeds even before
    # the Node process is fully warm.
    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    # Long-lived immutable assets emitted by Next.js with the build hash in
    # the filename — safe to cache aggressively.
    location /_next/static/ {
      alias /app/.next/static/;
      access_log off;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Files under /public are addressed at the site root by Next.js.
    location /public/ {
      alias /app/public/;
      access_log off;
      expires 1h;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection        "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_pass http://nextjs;
    }
  }
}
