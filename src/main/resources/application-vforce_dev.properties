# BANK S-FB-2 - VForce360 dev profile.
#
# vforce_dev does not provision the legacy DB2 history database, but it does
# run beside the platform-managed bank-mongo service in the same namespace.
# Keep Mongo on the in-cluster service when the generated deployment does not
# set SPRING_DATA_MONGODB_URI. The dev bank-mongo StatefulSet is initialized
# with root credentials, so authenticate against admin while using the bank DB.
# Keep the history repositories/Flyway on the same in-memory H2
# DB2-compatibility setup used by the integration suite so the pod never falls
# back to loopback services at startup.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://bank:bank-mongo-dev-pw@bank-mongo:27017/bank?authSource=admin}
# Dev smoke endpoints must boot even while the platform-managed Mongo service is
# still resolving. Repository operations will still fail normally until Mongo is
# reachable; only startup-time index creation is deferred.
spring.data.mongodb.auto-index-creation=${SPRING_DATA_MONGODB_AUTO_INDEX_CREATION:false}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:bank-vforce-dev;MODE=DB2;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
