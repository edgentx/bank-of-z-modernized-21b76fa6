# BANK — Bank-of-Z modernization (Track B)
# Spring Boot configuration.

spring.application.name=teller-core

# ---- MongoDB (S-28) -----------------------------------------------------------
# Connection settings for the domain-aggregate Mongo adapters introduced in S-28.
# Override the host/port/database via SPRING_DATA_MONGODB_URI in the container
# environment; the values below are sensible local-dev defaults.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/bank}
spring.data.mongodb.auto-index-creation=true

# ---- DB2 history bridge (S-29) ------------------------------------------------
# JPA + Flyway against the legacy DB2 shared-history database. Override via env
# vars (SPRING_DATASOURCE_URL / USERNAME / PASSWORD) at deploy time. The local-
# dev defaults point at a localhost DB2 instance — they are placeholders, not
# credentials.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:db2://localhost:50000/BANK}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:db2inst1}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeit}
spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver

# HikariCP pool sizing. DB2 connection turnover is expensive; a small, long-
# lived pool is preferred over rapid-cycling many short ones.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=db2-history-pool

# Hibernate / JPA. ddl-auto=validate: schema is owned by Flyway, JPA only
# validates entity-to-table alignment at startup.
spring.jpa.database-platform=org.hibernate.dialect.DB2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway controls the DB2 schema. Disable in 'test' profile (H2 setup runs the
# same migrations directly via DataSource override).
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
