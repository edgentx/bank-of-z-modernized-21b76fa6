# Spring Boot Application Configuration
spring.application.name=vforce360-backend

# Database Integration (Shared History)
spring.datasource.url=jdbc:db2://shared-db.host:50000/DB2SHR
spring.datasource.username=db2admin
spring.datasource.password=${DB2_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.DB2Dialect

# MongoDB (VForce360 Shared)
spring.data.mongodb.host=mongo.shared.host
spring.data.mongodb.port=27017
spring.data.mongodb.database=vforce360_shared
spring.data.mongodb.auto-index-creation=true

# Active Profile for Repository Switching
# app.report.repository.impl=mongo (default) | mock

# Logging
logging.level.com.vforce360=DEBUG
