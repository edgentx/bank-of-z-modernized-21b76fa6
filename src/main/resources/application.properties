# BANK — Bank-of-Z modernization (Track B)
# Spring Boot configuration.

spring.application.name=teller-core

# ---- MongoDB (S-28) -----------------------------------------------------------
# Connection settings for the domain-aggregate Mongo adapters introduced in S-28.
# Override the host/port/database via SPRING_DATA_MONGODB_URI in the container
# environment; the values below are sensible local-dev defaults.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/bank}
spring.data.mongodb.auto-index-creation=true

# ---- DB2 history bridge (S-29) ------------------------------------------------
# JPA + Flyway against the legacy DB2 shared-history database. Override via env
# vars (SPRING_DATASOURCE_URL / USERNAME / PASSWORD) at deploy time. The local-
# dev defaults point at a localhost DB2 instance — they are placeholders, not
# credentials.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:db2://localhost:50000/BANK}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:db2inst1}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeit}
spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver

# HikariCP pool sizing. DB2 connection turnover is expensive; a small, long-
# lived pool is preferred over rapid-cycling many short ones.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=db2-history-pool

# Hibernate / JPA. ddl-auto=validate: schema is owned by Flyway, JPA only
# validates entity-to-table alignment at startup.
spring.jpa.database-platform=org.hibernate.dialect.DB2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway controls the DB2 schema. Disable in 'test' profile (H2 setup runs the
# same migrations directly via DataSource override).
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ---- MinIO document storage (S-31) --------------------------------------------
# MinIO-backed implementation of DocumentStoragePort. Override the endpoint /
# credentials / default bucket per environment via env vars; values below are
# local-dev defaults that match the bundled MinIO compose stack.
storage.minio.endpoint=${STORAGE_MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${STORAGE_MINIO_ACCESS_KEY:minioadmin}
storage.minio.secret-key=${STORAGE_MINIO_SECRET_KEY:minioadmin}
storage.minio.region=${STORAGE_MINIO_REGION:us-east-1}
storage.minio.default-bucket=${STORAGE_MINIO_DEFAULT_BUCKET:bank-documents}
storage.minio.part-size=10485760
storage.minio.secure=${STORAGE_MINIO_SECURE:false}

# ---- Redis distributed cache (S-32) -------------------------------------------
# Spring Data Redis backed by Lettuce, wired through the CachePort hex port.
# Connection settings, namespace, and TTL policies all live here so changing
# cache lifetime never requires a code deploy. Per-region overrides under
# cache.redis.regions.<name>.ttl let session, query-result, and
# frequently-accessed-data slices have independent expiry policies.
cache.redis.host=${CACHE_REDIS_HOST:localhost}
cache.redis.port=${CACHE_REDIS_PORT:6379}
cache.redis.password=${CACHE_REDIS_PASSWORD:}
cache.redis.database=${CACHE_REDIS_DATABASE:0}
cache.redis.timeout=${CACHE_REDIS_TIMEOUT:PT2S}
cache.redis.namespace=${CACHE_REDIS_NAMESPACE:bank}
cache.redis.default-ttl=${CACHE_REDIS_DEFAULT_TTL:PT10M}
# Teller-session aggregate snapshots: short TTL because session state changes
# fast and a stale view is worse than re-reading from Mongo.
cache.redis.regions.teller-session.ttl=PT5M
# Cached account-balance query results: medium TTL — balances tolerate brief
# staleness, and the underlying ledger is the system of record on cache miss.
cache.redis.regions.account-balance.ttl=PT1M
# Statement-summary cards on the teller dashboard rarely change once issued.
cache.redis.regions.statement-summary.ttl=PT1H

# ---- Actuator (S-32 health requirement) ---------------------------------------
# Expose the health endpoint with detail so the Redis health indicator is
# visible at /actuator/health (and the dedicated /actuator/health/redis path).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
