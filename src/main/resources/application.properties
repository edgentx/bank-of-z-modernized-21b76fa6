# BANK — Bank-of-Z modernization (Track B)
# Spring Boot configuration.

spring.application.name=teller-core

# ---- MongoDB (S-28) -----------------------------------------------------------
# Connection settings for the domain-aggregate Mongo adapters introduced in S-28.
# Override the host/port/database via SPRING_DATA_MONGODB_URI in the container
# environment; the values below are sensible local-dev defaults.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/bank}
spring.data.mongodb.auto-index-creation=true

# ---- DB2 history bridge (S-29) ------------------------------------------------
# JPA + Flyway against the legacy DB2 shared-history database. Override via env
# vars (SPRING_DATASOURCE_URL / USERNAME / PASSWORD) at deploy time. The local-
# dev defaults point at a localhost DB2 instance — they are placeholders, not
# credentials.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:db2://localhost:50000/BANK}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:db2inst1}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeit}
spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver

# HikariCP pool sizing. DB2 connection turnover is expensive; a small, long-
# lived pool is preferred over rapid-cycling many short ones.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=db2-history-pool

# Hibernate / JPA. ddl-auto=validate: schema is owned by Flyway, JPA only
# validates entity-to-table alignment at startup.
spring.jpa.database-platform=org.hibernate.dialect.DB2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway controls the DB2 schema. Disable in 'test' profile (H2 setup runs the
# same migrations directly via DataSource override).
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ---- MinIO document storage (S-31) --------------------------------------------
# MinIO-backed implementation of DocumentStoragePort. Override the endpoint /
# credentials / default bucket per environment via env vars; values below are
# local-dev defaults that match the bundled MinIO compose stack.
storage.minio.endpoint=${STORAGE_MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${STORAGE_MINIO_ACCESS_KEY:minioadmin}
storage.minio.secret-key=${STORAGE_MINIO_SECRET_KEY:minioadmin}
storage.minio.region=${STORAGE_MINIO_REGION:us-east-1}
storage.minio.default-bucket=${STORAGE_MINIO_DEFAULT_BUCKET:bank-documents}
storage.minio.part-size=10485760
storage.minio.secure=${STORAGE_MINIO_SECURE:false}

# ---- Redis distributed cache (S-32) -------------------------------------------
# Spring Data Redis backed by Lettuce, wired through the CachePort hex port.
# Connection settings, namespace, and TTL policies all live here so changing
# cache lifetime never requires a code deploy. Per-region overrides under
# cache.redis.regions.<name>.ttl let session, query-result, and
# frequently-accessed-data slices have independent expiry policies.
cache.redis.host=${CACHE_REDIS_HOST:localhost}
cache.redis.port=${CACHE_REDIS_PORT:6379}
cache.redis.password=${CACHE_REDIS_PASSWORD:}
cache.redis.database=${CACHE_REDIS_DATABASE:0}
cache.redis.timeout=${CACHE_REDIS_TIMEOUT:PT2S}
cache.redis.namespace=${CACHE_REDIS_NAMESPACE:bank}
cache.redis.default-ttl=${CACHE_REDIS_DEFAULT_TTL:PT10M}
# Teller-session aggregate snapshots: short TTL because session state changes
# fast and a stale view is worse than re-reading from Mongo.
cache.redis.regions.teller-session.ttl=PT5M
# Cached account-balance query results: medium TTL — balances tolerate brief
# staleness, and the underlying ledger is the system of record on cache miss.
cache.redis.regions.account-balance.ttl=PT1M
# Statement-summary cards on the teller dashboard rarely change once issued.
cache.redis.regions.statement-summary.ttl=PT1H

# ---- Temporal workflow orchestration (S-33) -----------------------------------
# Durable workflow execution for the account-opening saga and the CICS/IMS
# legacy-transaction orchestration. The values below are local-dev defaults
# that match the bundled Temporal compose stack; override per environment via
# the WORKFLOW_TEMPORAL_* env vars at deploy time. The Temporal UI is served by
# the Temporal server itself on port 8233 by default (separate from the gRPC
# port below) and is accessible at http://<host>:8233 for workflow monitoring.
workflow.temporal.target=${WORKFLOW_TEMPORAL_TARGET:127.0.0.1:7233}
workflow.temporal.namespace=${WORKFLOW_TEMPORAL_NAMESPACE:bank}
workflow.temporal.task-queue=${WORKFLOW_TEMPORAL_TASK_QUEUE:bank-tasks}
# Worker on/off switch — keep disabled by default so unit tests and the
# embedded H2 BDD suite never need a running Temporal server. Container
# deployments set this to true via env var.
workflow.temporal.worker-enabled=${WORKFLOW_TEMPORAL_WORKER_ENABLED:false}
# Top-level workflow execution timeout. The account-opening saga is bounded
# at 10 minutes because compensation must be initiated long before a human
# operator gives up and intervenes.
workflow.temporal.workflow-execution-timeout=${WORKFLOW_TEMPORAL_WF_EXECUTION_TIMEOUT:PT10M}
# Per-activity defaults — the saga workflow can override on individual stubs
# when a step needs different retry semantics (e.g. idempotent reads vs
# state-changing writes).
workflow.temporal.activity-start-to-close-timeout=${WORKFLOW_TEMPORAL_ACTIVITY_START_TO_CLOSE:PT30S}
workflow.temporal.activity-schedule-to-close-timeout=${WORKFLOW_TEMPORAL_ACTIVITY_SCHEDULE_TO_CLOSE:PT2M}
# Activity retry policy — exponential backoff with a small initial interval
# so transient gRPC blips do not block the saga, but long enough that we do
# not hammer a downstream service that is genuinely down.
workflow.temporal.retry.initial-interval=${WORKFLOW_TEMPORAL_RETRY_INITIAL:PT1S}
workflow.temporal.retry.maximum-interval=${WORKFLOW_TEMPORAL_RETRY_MAX:PT30S}
workflow.temporal.retry.backoff-coefficient=${WORKFLOW_TEMPORAL_RETRY_BACKOFF:2.0}
workflow.temporal.retry.maximum-attempts=${WORKFLOW_TEMPORAL_RETRY_ATTEMPTS:5}

# ---- IBM MQ JMS messaging adapter (S-34) --------------------------------------
# Replicates the legacy CICS/IMS async fan-out pattern over IBM MQ. The whole
# JMS stack (publisher, listener containers, transaction manager) is gated
# behind messaging.ibmmq.enabled so unit tests and the embedded BDD suite never
# need a running broker. Container deployments flip it on via env vars.
# Logical destination names (account.events, transaction.events, etc.) are
# mapped to wire-level MQ queue names via the destinations map so application
# code never references mainframe-style queue names directly.
messaging.ibmmq.enabled=${MESSAGING_IBMMQ_ENABLED:false}
messaging.ibmmq.queue-manager=${MESSAGING_IBMMQ_QUEUE_MANAGER:QM1}
messaging.ibmmq.host-name=${MESSAGING_IBMMQ_HOST:localhost}
messaging.ibmmq.port=${MESSAGING_IBMMQ_PORT:1414}
messaging.ibmmq.channel=${MESSAGING_IBMMQ_CHANNEL:DEV.APP.SVRCONN}
messaging.ibmmq.user=${MESSAGING_IBMMQ_USER:app}
messaging.ibmmq.password=${MESSAGING_IBMMQ_PASSWORD:}
messaging.ibmmq.ccsid=${MESSAGING_IBMMQ_CCSID:1208}
messaging.ibmmq.ssl-enabled=${MESSAGING_IBMMQ_SSL_ENABLED:false}
messaging.ibmmq.ssl-cipher-suite=${MESSAGING_IBMMQ_SSL_CIPHER_SUITE:}
messaging.ibmmq.dead-letter-queue=${MESSAGING_IBMMQ_DLQ:BANK.DLQ}
# Off by default. Container deployments that host listeners set to true.
messaging.ibmmq.listener-enabled=${MESSAGING_IBMMQ_LISTENER_ENABLED:false}
messaging.ibmmq.concurrency=${MESSAGING_IBMMQ_CONCURRENCY:1-3}
messaging.ibmmq.session-transacted=${MESSAGING_IBMMQ_SESSION_TRANSACTED:true}
messaging.ibmmq.receive-timeout=${MESSAGING_IBMMQ_RECEIVE_TIMEOUT:PT5S}
# Logical -> wire destination mapping. Add additional entries per event family.
messaging.ibmmq.destinations.account.events=${MESSAGING_IBMMQ_DEST_ACCOUNT_EVENTS:BANK.ACCT.EVT.Q}
messaging.ibmmq.destinations.transaction.events=${MESSAGING_IBMMQ_DEST_TRANSACTION_EVENTS:BANK.TXN.EVT.Q}
messaging.ibmmq.destinations.customer.events=${MESSAGING_IBMMQ_DEST_CUSTOMER_EVENTS:BANK.CUST.EVT.Q}
messaging.ibmmq.destinations.legacy.bridge=${MESSAGING_IBMMQ_DEST_LEGACY_BRIDGE:BANK.LEGACY.BRIDGE.Q}

# ---- OpenTelemetry tracing (S-35) ---------------------------------------------
# OpenTelemetry SDK + OTLP exporter for distributed tracing across HTTP and
# JMS boundaries. The whole stack is gated behind telemetry.otel.enabled so
# unit tests and the embedded BDD suite never need a running collector;
# OpenTelemetry.noop() is published when disabled and every DomainTracer /
# filter / JMS propagator call becomes a cheap no-op. Container deployments
# flip TELEMETRY_OTEL_ENABLED=true to activate the real pipeline.
telemetry.otel.enabled=${TELEMETRY_OTEL_ENABLED:false}
telemetry.otel.service-name=${TELEMETRY_OTEL_SERVICE_NAME:teller-core}
telemetry.otel.environment=${TELEMETRY_OTEL_ENVIRONMENT:dev}
telemetry.otel.otlp-endpoint=${TELEMETRY_OTEL_OTLP_ENDPOINT:http://localhost:4317}
telemetry.otel.otlp-timeout=${TELEMETRY_OTEL_OTLP_TIMEOUT:PT10S}
# Parent-based ratio sampler probability. 1.0 = sample everything (dev/CI);
# operators commonly drop this to 0.1 in prod once trace volume settles.
telemetry.otel.sampling-ratio=${TELEMETRY_OTEL_SAMPLING_RATIO:1.0}
telemetry.otel.max-queue-size=${TELEMETRY_OTEL_MAX_QUEUE_SIZE:2048}
telemetry.otel.schedule-delay=${TELEMETRY_OTEL_SCHEDULE_DELAY:PT0.5S}

# ---- Actuator (S-32 health requirement + S-35 OTel metrics) -------------------
# Expose the health endpoint with detail so the Redis health indicator is
# visible at /actuator/health (and the dedicated /actuator/health/redis path).
# S-35 adds the prometheus + metrics endpoints so operators can observe the
# Micrometer registry that the OTLP metrics exporter is shipping.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# Micrometer → OTLP metrics export (S-35).
# Spring Boot 3.2 auto-configures an OtlpMeterRegistry when
# micrometer-registry-otlp is on the classpath. Disabled by default so unit
# tests do not background-ship metrics; container deployments enable it
# alongside TELEMETRY_OTEL_ENABLED=true. The URL points at the collector's
# HTTP /v1/metrics endpoint — note the gRPC trace endpoint and the HTTP
# metrics endpoint are configured separately because the SDK ships traces
# over gRPC and Micrometer ships metrics over HTTP/protobuf.
management.otlp.metrics.export.enabled=${TELEMETRY_OTEL_METRICS_ENABLED:false}
management.otlp.metrics.export.url=${TELEMETRY_OTEL_METRICS_URL:http://localhost:4318/v1/metrics}
management.otlp.metrics.export.step=${TELEMETRY_OTEL_METRICS_STEP:PT1M}
management.otlp.metrics.export.resource-attributes.service.name=${TELEMETRY_OTEL_SERVICE_NAME:teller-core}
management.otlp.metrics.export.resource-attributes.deployment.environment=${TELEMETRY_OTEL_ENVIRONMENT:dev}
